kind = "mobile"
previewPath = "/mobile/"
title = "ENOSX Assistant Mobile"
version = "1.0.0"
id = "artifacts/enosx-assistant-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 19286

[services.development]
run = "pnpm --filter @workspace/enosx-assistant-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/enosx-assistant-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/enosx-assistant-mobile", "run", "serve" ]

[services.env]
PORT = "19286"
BASE_PATH = "/mobile/"
